name: MaaS Code Assistant
version: 1.0.0
schema: v1
models:
  - name: NVIDIA Nemotron 3 Nano 30B-A3B
    provider: openai
    model: "nemotron-3-nano-30b-a3b"
    apiBase: "YOUR_MAAS_ROUTE/maas/nemotron-3-nano-30b-a3b/v1"
    apiKey: "YOUR_API_KEY"
    contextLength: 131072
    capabilities:
      - tool_use
    defaultCompletionOptions:
      reasoning: true
      maxTokens: 4096
    chatOptions:
      toolOverrides:
        run_terminal_command:
          disabled: true

  - name: OpenAI gpt-oss-20b
    provider: openai
    model: "gpt-oss-20b"
    apiBase: "YOUR_MAAS_ROUTE/maas/gpt-oss-20b/v1"
    apiKey: "YOUR_API_KEY"
    contextLength: 8192
    defaultCompletionOptions:
      maxTokens: 4096
    chatOptions:
      toolOverrides:
        run_terminal_command:
          disabled: true

  - name: OpenAI GPT-4o
    provider: openai
    model: "gpt-4o"
    apiBase: "YOUR_MAAS_ROUTE/maas/gpt-4o/v1"
    apiKey: "YOUR_API_KEY"
    contextLength: 128000
    capabilities:
      - tool_use
    defaultCompletionOptions:
      maxTokens: 4096
    chatOptions:
      toolOverrides:
        run_terminal_command:
          disabled: true

  - name: OpenAI GPT-4o Mini
    provider: openai
    model: "gpt-4o-mini"
    apiBase: "YOUR_MAAS_ROUTE/maas/gpt-4o-mini/v1"
    apiKey: "YOUR_API_KEY"
    contextLength: 128000
    capabilities:
      - tool_use
    defaultCompletionOptions:
      maxTokens: 4096
    chatOptions:
      toolOverrides:
        run_terminal_command:
          disabled: true

rules:
  - Continue runs inside Red Hat OpenShift Dev Spaces. Do not use the built-in run_terminal_command tool in this environment. Use the OpenShift MCP tools for read-only cluster inspection, and ask the user to run shell commands manually or use OpenCode when command execution is required.

context:
  - provider: code
  - provider: docs
  - provider: diff
  - provider: terminal
  - provider: problems
  - provider: folder
  - provider: codebase
