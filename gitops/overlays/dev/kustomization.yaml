apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: coolstore-inventory-dev
resources:
  - namespace.yaml
  - ../../base
labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/managed-by: gitops
      app.kubernetes.io/environment: dev
images:
  - name: image-registry.openshift-image-registry.svc:5000/coolstore-inventory-dev/coolstore-inventory-service
    newTag: latest
