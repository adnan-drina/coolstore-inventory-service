schemaVersion: 2.2.0
metadata:
  name: coolstore-inventory-service
  description: Coolstore inventory service workspace (Kilo Code via MaaS, Quarkus dev mode)
attributes:
  controller.devfile.io/scc: container-build
components:
  - name: tooling-container
    container:
      image: registry.redhat.io/devspaces/udi-rhel9:3.27.1
      sourceMapping: /projects
      memoryLimit: 4Gi
      memoryRequest: 1Gi
      cpuLimit: "2"
      cpuRequest: 500m
      env:
        - name: QUARKUS_HTTP_HOST
          value: 0.0.0.0
        - name: QUARKUS_ANALYTICS_DISABLED
          value: "true"
      endpoints:
        - name: quarkus-dev
          targetPort: 8080
          exposure: public
          secure: false
          protocol: https
        - name: debug
          targetPort: 5005
          exposure: none
          secure: false
          protocol: tcp
commands:
  - id: package
    exec:
      label: "1. Package the application"
      component: tooling-container
      workingDir: ${PROJECT_SOURCE}
      commandLine: "./mvnw package"
      group:
        kind: build
        isDefault: true
  - id: start-dev
    exec:
      label: "2. Start Development mode (Hot reload)"
      component: tooling-container
      workingDir: ${PROJECT_SOURCE}
      commandLine: "./mvnw compile quarkus:dev -Dquarkus.analytics.disabled=true"
      group:
        kind: run
        isDefault: true
