apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: coolstore-inventory-service-pr-
  annotations:
    pipelinesascode.tekton.dev/on-event: "[pull_request]"
    pipelinesascode.tekton.dev/on-target-branch: "[main]"
    pipelinesascode.tekton.dev/max-keep-runs: "5"
spec:
  taskRunTemplate:
    serviceAccountName: pipeline
  params:
    - name: repo-url
      value: "{{ repo_url }}"
    - name: revision
      value: "{{ revision }}"
    - name: image
      value: "image-registry.openshift-image-registry.svc:5000/coolstore-inventory-dev/coolstore-inventory-service:{{ revision }}"
  workspaces:
    - name: shared-workspace
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi
  pipelineSpec:
    params:
      - name: repo-url
        type: string
      - name: revision
        type: string
      - name: image
        type: string
    workspaces:
      - name: shared-workspace
    tasks:
      - name: clone
        taskRef:
          resolver: cluster
          params:
            - name: kind
              value: task
            - name: name
              value: git-clone
            - name: namespace
              value: openshift-pipelines
        params:
          - name: url
            value: $(params.repo-url)
          - name: revision
            value: $(params.revision)
          - name: deleteExisting
            value: "true"
        workspaces:
          - name: output
            workspace: shared-workspace
      - name: test-and-package
        runAfter:
          - clone
        taskSpec:
          workspaces:
            - name: source
          steps:
            - name: maven-test-package
              image: registry.access.redhat.com/ubi9/openjdk-21:1.23
              workingDir: $(workspaces.source.path)
              script: |
                #!/usr/bin/env bash
                set -euo pipefail

                ./mvnw -B test package
        workspaces:
          - name: source
            workspace: shared-workspace
      - name: build-image
        runAfter:
          - test-and-package
        taskRef:
          resolver: cluster
          params:
            - name: kind
              value: task
            - name: name
              value: buildah
            - name: namespace
              value: openshift-pipelines
        params:
          - name: IMAGE
            value: $(params.image)
          - name: DOCKERFILE
            value: ./Containerfile
          - name: CONTEXT
            value: .
          - name: TLSVERIFY
            value: "true"
        workspaces:
          - name: source
            workspace: shared-workspace
